version: "3.9"

services:
  backend:
    build:
      context: ./golden response/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./golden response/models:/models:ro
    environment:
      - MONGO_URI=mongodb://db:27017/ai_movies
      - JWT_SECRET=${JWT_SECRET:-dev_secret_change_in_production}
      - REDIS_URL=redis://redis:6379
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MODELS_DIR=/models
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./golden response/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
